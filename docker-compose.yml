services:
  postgres:
    image: postgres:16
    container_name: agent-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_hub}
      POSTGRES_USER: ${POSTGRES_USER:-agent_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
    ports:
      - "127.0.0.1:54329:5432"  # localhost-only by default; expose via Terraform on the VM
    volumes:
      - agent_hub_pg:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_hub} -d ${POSTGRES_DB:-agent_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    container_name: agent-hub-gateway
    restart: unless-stopped
    command: ["serve"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_hub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_hub}?sslmode=disable
      LISTEN_ADDR: ":8787"
      SANITISER_PATTERNS_FILE: /etc/agent-hub/sanitiser-patterns.txt
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN required in .env}
    ports:
      - "8787:8787"
    volumes:
      - ./gateway/sanitiser-patterns.txt:/etc/agent-hub/sanitiser-patterns.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  outbox-worker:
    build: ./gateway
    container_name: agent-hub-outbox
    restart: unless-stopped
    command: ["outbox-worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_hub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_hub}?sslmode=disable
      MATTERMOST_URL: ${MATTERMOST_URL:?MATTERMOST_URL required in .env}
      MATTERMOST_TOKEN: ${MATTERMOST_TOKEN:?MATTERMOST_TOKEN required in .env}
      POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy

  inbox-webhook:
    build: ./gateway
    container_name: agent-hub-inbox-webhook
    restart: unless-stopped
    command: ["inbox-webhook"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_hub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_hub}?sslmode=disable
      LISTEN_ADDR: ":8788"
      WEBHOOK_SECRET: ${MATTERMOST_INBOX_WEBHOOK_SECRET:?MATTERMOST_INBOX_WEBHOOK_SECRET required in .env}
    ports:
      - "8788:8788"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  agent_hub_pg:
