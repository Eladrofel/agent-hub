services:
  postgres:
    image: postgres:16
    container_name: agent-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agent_hub}
      POSTGRES_USER: ${POSTGRES_USER:-agent_hub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required in .env}
    ports:
      - "127.0.0.1:54329:5432"  # localhost-only by default; expose via Terraform on the VM
    volumes:
      - agent_hub_pg:/var/lib/postgresql/data
      # Migrations are applied by the gateway container on startup via the
      # embedded migration runner (`agent-hub migrate`, also run by `serve`).
      # That keeps schema_migrations honest and avoids the dual-source bug
      # where /docker-entrypoint-initdb.d applies SQL without marking it
      # applied in the runner's tracking table.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_hub} -d ${POSTGRES_DB:-agent_hub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    build: ./gateway
    image: agent-hub-gateway:latest
    container_name: agent-hub-gateway
    restart: unless-stopped
    command: ["serve"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_hub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_hub}?sslmode=disable
      LISTEN_ADDR: ":8787"
      SANITISER_PATTERNS_FILE: /etc/agent-hub/sanitiser-patterns.txt
      # Exempt the operator's own gateway host from the §2.1 10.x leak
      # pattern (v0.1.3 task #29). Override per deployment.
      SANITISER_EXEMPT_HOSTS: ${SANITISER_EXEMPT_HOSTS:-10.0.5.38}
      MATTERMOST_DEFAULT_OUTBOX_CHANNEL: ${MATTERMOST_DEFAULT_OUTBOX_CHANNEL:-agent-events}
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN required in .env}
    ports:
      - "8787:8787"
    volumes:
      - ./gateway/sanitiser-patterns.txt:/etc/agent-hub/sanitiser-patterns.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8787/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # outbox-worker + inbox-webhook now ship real implementations as of v0.1.3
  # (ROADMAP #10 Component C — Mattermost bidirectional). No compose profile;
  # they come up by default with the rest of the stack.
  outbox-worker:
    build: ./gateway
    image: agent-hub-gateway:latest
    container_name: agent-hub-outbox
    restart: unless-stopped
    command: ["outbox-worker"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_hub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_hub}?sslmode=disable
      MATTERMOST_URL: ${MATTERMOST_URL:?MATTERMOST_URL required in .env}
      MATTERMOST_TOKEN: ${MATTERMOST_TOKEN:?MATTERMOST_TOKEN required in .env}
      MATTERMOST_TEAM_NAME: ${MATTERMOST_TEAM_NAME:?MATTERMOST_TEAM_NAME required in .env (v0.1.3+)}
      # MATTERMOST_TLS_SKIP_VERIFY=true for homelab self-signed certs (v0.1.4+).
      # Default empty/false enforces full cert validation.
      MATTERMOST_TLS_SKIP_VERIFY: ${MATTERMOST_TLS_SKIP_VERIFY:-false}
      POLL_INTERVAL_SECONDS: ${OUTBOX_POLL_INTERVAL_SECONDS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      gateway:
        condition: service_healthy

  inbox-webhook:
    build: ./gateway
    image: agent-hub-gateway:latest
    container_name: agent-hub-inbox-webhook
    restart: unless-stopped
    command: ["inbox-webhook"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agent_hub}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-agent_hub}?sslmode=disable
      LISTEN_ADDR: ":8788"
      WEBHOOK_SECRET: ${MATTERMOST_INBOX_WEBHOOK_SECRET:?MATTERMOST_INBOX_WEBHOOK_SECRET required in .env}
    ports:
      - "8788:8788"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  agent_hub_pg:
